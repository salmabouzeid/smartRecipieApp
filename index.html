<!DOCTYPE html>
<html>
<head>
  <title>Smart Recipe App Test</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="bg-circle bg1"></div>
  <div class="bg-circle bg2"></div>
  <div class="bg-circle bg3"></div>

  <div class="page">
    <div class="app-card">
      <div class="hero">
        <div class="hero-text">
          <p class="tag">🍴 Smart Recipe Generator</p>
          <h1>Cook something with ingrediants you have</h1>
          <p class="subtitle">
            Enter your ingredients and get a recipe in seconds.
          </p>
        </div>

        <div class="hero-icons">
          <span>🥑</span>
          <span>🍅</span>
          <span>🥕</span>
          <span>🍝</span>
        </div>
      </div>

      <div class="search-section">
        <label for="ingredients">Ingredients</label>
        <input type="text" id="ingredients" placeholder="Try: rice, chicken, garlic, cream..."
        />
      </div>

      <div class="button-group">
        <button class="generate-btn" onclick="getRecipe()">Generate Recipe</button>
        <button class="saved-btn" onclick="loadRecipes()">Saved Recipes</button>
      </div>

  <div id="result"></div>

   </div>
  </div>

  <script src="script.js?v=2"></script>


</body>
</html>
