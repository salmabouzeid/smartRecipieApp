name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: salmatarek5/smart-recipe-app:test

      - name: Smoke test
        run: |
          docker build -t smart-recipe-smoke .
          docker run -d -p 5000:5000 --name smart-recipe-smoke smart-recipe-smoke
          sleep 5
          RESPONSE=$(curl -s http://localhost:5000/api/health)
          echo "Response: $RESPONSE"
          if [[ "$RESPONSE" != "ok" ]]; then
            echo "Smoke test failed"
            docker logs smart-recipe-smoke
            docker stop smart-recipe-smoke
            exit 1
          fi
          docker stop smart-recipe-smoke

  push-and-deploy:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            salmatarek5/smart-recipe-app:latest
            salmatarek5/smart-recipe-app:${{ github.sha }}

      - name: Deploy to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_URL }}"