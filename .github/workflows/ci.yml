name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t salmatarek5/smartrecipeapp:latest .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t salmatarek5/smartrecipeapp:latest \
            -t salmatarek5/smartrecipeapp:${{ github.sha }} \
            --push .

      - name: Trigger Render deploy for exact image
        run: |
          ENCODED_IMG_URL="docker.io%2Fsalmatarek5%2Fsmartrecipeapp%3A${{ github.sha }}"
          curl "${{ secrets.RENDER_DEPLOY_URL }}&imgURL=${ENCODED_IMG_URL}"